<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <aside class="sidebar">
      <div class="logo-container">
        <img src="imgs/logo.png" alt="Logo" class="logo-icon">
        <h1 class="logo-text">Natural</h1>
      </div>
      <div class="credit">
        Photo by <a href="#">Halie West</a> on <a href="#">Unsplash</a>
      </div>
    </aside>

    <main class="content">
      
      <div class="header-text">
        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>Sign up <em>now</em> to get started.</p>
        <p>You <em>know</em> you want to.</p>
      </div>

      <div class="form-container">
        <h2>Let's do this!</h2>
        <form action="#" method="POST">
          <div class="form-row">
            <div class="input-group">
              <label for="first-name">FIRST NAME</label>
              <input type="text" id="first-name" name="first-name">
            </div>
            <div class="input-group">
              <label for="last-name">LAST NAME</label>
              <input type="text" id="last-name" name="last-name">
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="email">EMAIL</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
              <label for="phone">PHONE NUMBER</label>
              <input type="tel" id="phone" name="phone">
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" minlength="8" maxlength="16" required>
            </div>
            <div class="input-group">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input type="password" id="confirm-password" name="confirm-password" minlength="8" maxlength="16" required>
            </div>
          </div>
        </form>
      </div>

      <div class="action-container">
        <button type="submit" class="submit-btn">Create Account</button>
        <p class="login-text">Already have an account? <a href="#">Log in</a></p>
      </div>
      
    </main>
  </div>
</body>
</html>
